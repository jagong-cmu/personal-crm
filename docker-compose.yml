# Slice 0 runs Postgres+pgvector in Docker and the FastAPI app on the host
# (simplest OAuth localhost-redirect + iterative dev). The app is added to compose
# in a later slice once the loop is proven.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
